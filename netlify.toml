[build]
  command = "npm run build"
  publish = "dist" # или "build", смотря что выдает твой билд

[[edge_functions]]
  function = "tts"
  path = "/api/tts"

  [[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "frame-ancestors 'self' *; img-src * data:; script-src * 'unsafe-inline' 'unsafe-eval';"